name: build
on:
  workflow_dispatch: # Allows you to click a button to start the build
  push:
    branches: [main]
    paths-ignore: [ '**.md' ] # Don't build if you just edit a README
  schedule:
    - cron: '0 2 * * 6' # Builds every Saturday at 2 AM

env:
  # Using github.repository makes the name match your repo automatically
  IMAGE_TAG: ghcr.io/${{ github.repository }}:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45 # Desktop images are large, give it extra time

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Build the image locally on the GitHub Runner
      - name: Build Image
        run: podman build -t ${{ env.IMAGE_TAG }} .

      # 2. Log in to GHCR using the automatic GITHUB_TOKEN
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Push the finished image to your registry
      - name: Push Image
        run: podman push --format oci --compression-format zstd:chunked ${{ env.IMAGE_TAG }}
